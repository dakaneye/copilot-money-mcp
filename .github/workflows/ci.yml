name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install libsecret (keytar dependency)
        run: sudo apt-get update && sudo apt-get install -y libsecret-1-dev

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - run: npm run build

      - run: npm run lint

      - run: npm test
